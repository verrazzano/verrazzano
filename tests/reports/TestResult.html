  <script>
    const metrics1 = 'METRICS_01'
    const LookBack = 20 //number of builds look back

    function td(text, link, color) {
        let col = doc.createElement("td");
        if (!link) {
            col.appendChild(doc.createTextNode(text));
        } else {
            col.appendChild(anchor(text, link));
        }
        if (color) {
            col.style.backgroundColor = color;
        }
        return col
    }

    function tdTxt(text) {
        return td(text, null, null)
    }

    function anchor(text, link) {
        let a = doc.createElement("a");
        a.appendChild(doc.createTextNode(text));
        a.title = text;
        a.href = link;
        a.target='_blank';
        return a
    }

    function tdJob(job) {
        var text = 'None';
        var link = null;
        var color = null;
        if (job) {
            if (job.result) {
                text = job.result
                color = colorOf(job.result)
            } else {
                text = 'Running'
            }
            // link = blueOceanLink(job.url)
            let col = doc.createElement("td");
            col.style.backgroundColor = color;
            col.appendChild(anchor(text, job.url));
            col.appendChild(doc.createTextNode(' '));
            col.appendChild(anchor('Blue', blueOceanLink(job.url)));
            return col;
        }
        return td(text, link, color)
    }

    function blueOceanLink(link) {
        return link.replace('.io/job/','.io/blue/organizations/jenkins/').replace('/job/','/detail/')
    }

    function colorOf(status) {
        if (status === 'SUCCESS') {
            return '#7FFFD4' //green
        } else if (status === 'FAILURE') {
            return '#FF0000' //red
        } else if (status === 'YELLOW') {
            return '#FFFF00' //yellow
        }
        return null
    }

    function getUpstreamBuild(upstreamName, job) {
        for (var i = 0; i < job.actions.length; i++) {
            if (job.actions[i]._class == "hudson.model.CauseAction") {
              for (var j = 0; j < job.actions[i].causes.length; j++) {
                if (job.actions[i].causes[j].upstreamProject == upstreamName &&
                    job.actions[i].causes[j].upstreamBuild != null) {
                  return job.actions[i].causes[j].upstreamBuild
                }
              }
            }
        }
        return null
    }

    function findCommitMsg(job) {
        for (var i = 0; i < job.changeSets.length; i++) {
// console.log(job.actions[i]);
// console.log(job.actions[i]._class);
            if (job.changeSets[i]._class == "hudson.plugins.git.GitChangeSetList") {
              for (var j = 0; j < job.changeSets[i].items.length; j++) {
                if (job.changeSets[i].items[j].msg) {
                  return job.changeSets[i].items[j].msg
                }
               if (job.changeSets[i].items[j].authorEmail &&
                        (job.changeSets[i].items[j].authorEmail != 'noreply@github.com')) {
                 return job.changeSets[i].items[j].authorEmail
                }
              }
            }
        }
        // console.log("~~upstreamBuild~~"+upstreamBuild);
        return null
    }

    function findCauseUser(job) {
        for (var i = 0; i < job.actions.length; i++) {
            if (job.actions[i]._class == "hudson.model.CauseAction") {
              for (var j = 0; j < job.actions[i].causes.length; j++) {
                if (job.actions[i].causes[j].userName != null) {
                  return job.actions[i].causes[j].userName
                }
              }
            }
        }
        return null
    }

    function findChangeInfo(job) {
        var info = findCauseUser(job)
        if (info == null) {
            info = findCommitMsg(job)
            if (info!=null) {
              //trim to 10
              var end = info.lastIndexOf("(")
              if (end > -1) {
                  const num = info.substring(end, info.lastIndexOf(")")+1)+ ' '
                  const msg = (end > 20)?info.substring(0,20)+ '...' : info.substring(0,end)
                  info = num + msg
              } else {
                  info = (info.length > 27)?info.substring(0,27)+ '...' : info
              }
            }
        }
        return info
    }

    const triggerNums = new Map(); // masterBuild# : triggerNumber
    const triggerJobs = new Map(); // masterBuild# : triggerNumber
    async function getTrigger(buildNum) {
        var trigger = triggerNums.get(buildNum)
// console.log("==== getTrigger buildNum:"+buildNum+" trigger:"+trigger);
        if (trigger != null) {
            return trigger
        }
        url = "https://build.verrazzano.io/job/verrazzano-push-triggered-acceptance-tests/job/master/api/json"
        const triggerJs = await get(url);
        for(var i = 0; i < (LookBack+5); i++) {
          const triggerBuild = triggerJs.builds[i];
          var triggerJob = triggerJobs.get(triggerBuild.number);
          if (!triggerJob) {
              triggerJob = await get(triggerBuild.url+"/api/json");
              triggerJobs.set(triggerJob.number, triggerJob)
          }
// console.log("==== getTrigger buildNum:"+buildNum+" triggerBuild.number:"+triggerBuild.number);
// console.log(triggerJob);
          const upNumber = getUpstreamBuild('verrazzano/master', triggerJob)
          if (upNumber != null) {
            triggerNums.set(upNumber, triggerJob.number);
          }
        }
        return triggerNums.get(buildNum)
    }

    function containsParam(parameters, name, value) {
        for (var i = 0; i < parameters.length; i++) {
            if (parameters[i].name == name && parameters[i].value == value) {
                return true
            }
        }
        return false
    }
    function findJob(map, parameters) {
        if (!map) {
            return null
        }
        for (let [num, job] of map) {
            if (parameters) {
                for (var i = 0; i < job.actions.length; i++) {
                    if (job.actions[i]._class == "hudson.model.ParametersAction") {
                        var matched = true
                        for (let [name, value] of parameters) {
                            matched = matched && containsParam(job.actions[i].parameters, name, value)
                        }
                        if (matched) {
                            return job
                        }
                    }
                }
            } else {
                return job
            }
        }
    }

    function Pipeline(name, branch, maxLookback) {
        const obj = {}
        obj.url = 'https://build.verrazzano.io/job/'+name+'/job/'+branch+'/api/json'
        obj.maps = new Map(); //trigger -> [buildNum, ...]
        obj.jobs = new Map(); //buildNum -> Job
        obj.list = null;
        obj.maxLookback = maxLookback
        obj.getJob = async function(buildNum, parameters) {
            var trigger = await getTrigger(buildNum)
            if (trigger == null) {
                return null;//not running yet
            }
            var jobs = obj.maps.get(trigger)
            if (jobs) {
                if (parameters) {
                    const job = findJob(jobs, parameters)
                    if (job) {
                        return job
                    }
                } else {
                    return jobs.values().next().value
                }
            }
    // url = "https://build.verrazzano.io/job/verrazzano-multi-cluster-acceptance-tests/job/master/api/json"
            // const tests = await get(obj.url);
            if (!obj.list) {
                obj.list = await get(obj.url);
            }
            for(var i = 0; i < obj.maxLookback; i++) {
                const testBuild = obj.list.builds[i];
                if (!obj.jobs.has(testBuild.number)) {
                    const testJob = await get(testBuild.url+"/api/json");
                    obj.jobs.set(testJob.number, testJob)
                    const upNumber = getUpstreamBuild('verrazzano-push-triggered-acceptance-tests/master', testJob)
                    if (upNumber != null) {
                        const map = obj.maps.has(upNumber) ? obj.maps.get(upNumber) : new Map()
                        map.set(testJob.number, testJob)
                        obj.maps.set(upNumber, map)
                        if (upNumber == trigger) {
                            const job = findJob(map, parameters)
                            if (job) {
                                return job
                            }
                        }
                    }
                } else {
        // console.log("!!! cached: "+obj.jobs.get(testBuild.number));
                }
            }
            return findJob(obj.maps.get(trigger), parameters)
            // return obj.jobs.get(obj.maps.get(trigger))
        }
        return obj
    }

    const mcatPipe = Pipeline('verrazzano-multi-cluster-acceptance-tests', 'master', 50)

    async function get(url) {
          const res = await fetch(url, {
            method: "GET",
            headers: {
              "Content-Type": "application/json"
            }
          });
          return await res.json();
    }

    function rowStatus(jobs) {
        var status = null
        var running = false
        for (var i = 0; i < jobs.length; i++) {
            if (jobs[i] && jobs[i].result) {
                if (!status) {
                    status = jobs[i].result
                } else if (status != jobs[i].result) {
                    return 'YELLOW'//#FFFF00
                }
            } else {
                if (jobs[i]) {
                    running = true
                }
            }
        }
        return running ? null : status
    }
